 personality_fallen_empire_authoritarian_imperium: "缄默御座"
 personality_fallen_empire_authoritarian_imperium_desc: "这个堕落帝国曾由一位近乎神话的永生神皇带领，缔造了年轻星海最繁荣的时代。自神皇失踪后，它们停止了几乎一切对外交往，将疆域收缩到古老帝庭的阴影之中。它们仍以帝国的威严审视银河，却很少主动干涉所谓年轻文明的纷争。"
 personality_awakened_fallen_empire_authoritarian_imperium: "复辟天命"
 personality_awakened_fallen_empire_authoritarian_imperium_desc: "这个觉醒帝国已经重新相信自己肩负统御银河的天命。它们不再满足于守望逝去神皇的遗产，而是准备以第二位永生皇帝的名义恢复旧日秩序。"

 tech_FEI_thruster: "太虚VI型暗物质湮灭引擎"
 tech_FEI_thruster_desc: "这种六级推进器利用暗物质湮灭产生的定向势阱牵引舰体，以近乎跃迁前置态的方式进行常规航行。它无法取代真正的跃迁引擎，却足以让军国先驱的舰队在战场上保持令人窒息的机动性。"
