 fei_militarist_story.51.name: "最终秩序"
 fei_militarist_story.51.desc: "银河的最后抵抗已经熄灭。[event_target:FEI_militarist_final_order_country.GetName]的舰队不再以复仇者的姿态穿行星海，而是以新秩序的执行者自居。\n\n曾经被仇恨拖回银河的先驱，如今站在废墟与王座之间。它们宣称旧银河已经燃尽，而任何来自河外、虚境或更深黑暗的威胁，都将首先撞上它们重铸后的战争机器。\n\n这不是和平。只是一个由战争定义的终局。"
 fei_militarist_story.51.a: "银河燃尽，秩序降临。"
