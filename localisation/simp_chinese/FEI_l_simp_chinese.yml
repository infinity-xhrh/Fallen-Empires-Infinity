 tech_FEI_energy_torpedo: "相位能量鱼雷"
 tech_FEI_energy_torpedo_desc: "将高密度能量团包裹进短寿命相位壳层，使其在敌舰护盾内侧坍缩爆发。它并非追求一次性的穿透，而是在命中瞬间撕裂防御层并灼穿舰体。"
