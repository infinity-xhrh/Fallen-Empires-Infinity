 fei_authoritarian_veil_war_situation_desc: "帷幕刺穿机已经真正触及深层虚境囚笼的外壁。那些囚笼看守者正在分阶段反扑，试图摧毁守护机器的深空擎天堡。只要擎天堡仍然存在，现实就仍有一枚楔子刺入虚境深处。"
 fei_authoritarian_veil_war_hold_the_line: "固守擎天堡"
 fei_authoritarian_veil_war_complete_tooltip: "深层虚境反冲进入最终阶段。"
 fei_authoritarian_veil_war_stage_1_tooltip: "第一阶段：阴影开始组织反扑。"
 fei_authoritarian_veil_war_stage_2_tooltip: "第二阶段：更多堕落残影被投入战场。"
 fei_authoritarian_veil_war_stage_3_tooltip: "第三阶段：囚笼看守者亲自压近现实。"
 fei_authoritarian_story.70.name: "局势：第一道反冲"
 fei_authoritarian_story.70.desc: "深空擎天堡完成锚定后，帷幕刺穿机周围的空间开始持续震颤。第一批有组织的虚境残影沿着刺穿机造成的裂痕回溯而来。\n\n它们并非真正的主力，更像是囚笼看守者伸出的试探性触须。但这一次，它们不再无视现实中的守军。"
 fei_authoritarian_story.70.a: "守住擎天堡。"
 fei_authoritarian_story.73.name: "局势：第二道反冲"
 fei_authoritarian_story.73.desc: "第一波敌军被击退后，深层虚境没有沉寂。相反，更多被污染的先驱舰形开始从裂痕边缘显现。\n\n策展人的监测数据指出，这些舰队中混杂着许多早已不该存在的识别码。它们可能是失败营救者的残影，也可能是堕落者故意披上的旧时代外壳。"
 fei_authoritarian_story.73.a: "它们正在加码。"
 fei_authoritarian_story.76.name: "局势：第三道反冲"
 fei_authoritarian_story.76.desc: "帷幕刺穿机的针尖已经触碰到某种更深的屏障。深空擎天堡周围的每一寸空间都被压成近乎实体的阴影。\n\n这一次，来袭的不再只是试探。囚笼看守者正在把真正能够封死裂痕的力量投入现实。"
 fei_authoritarian_story.76.a: "最后一道防线。"
 fei_authoritarian_story.79.name: "反冲暂息"
 fei_authoritarian_story.79.desc: "第三阶段反冲被击退后，深层虚境的压力终于短暂回落。深空擎天堡仍然屹立在[event_target:FEI_authoritarian_veil_system.GetName]中，帷幕刺穿机也仍在继续运转。\n\n没有人宣布胜利。所有观察者都知道，真正的囚笼尚未打开。但这一次，现实没有被迫退让。"
 fei_authoritarian_story.79.a: "继续推进。"
 NAME_FEI_authoritarian_stage_1_assault_fleet: "第一道反冲"
 NAME_FEI_authoritarian_stage_2_assault_fleet: "第二道反冲"
 NAME_FEI_authoritarian_stage_3_assault_fleet: "第三道反冲"
 personality_awakened_fallen_empire_authoritarian_mad_queen: "虚狱堕冕"
 personality_awakened_fallen_empire_authoritarian_mad_queen_desc: "这位觉醒帝国的神皇从无尽囚禁中归来，却已将银河视作背叛者、软弱者与待裁断之物。她会以极端扩张欲和战争欲向年轻文明降下苛刻敕令，拒绝者将被灵能怒火惩戒。"
 personality_awakened_fallen_empire_authoritarian_waiting_throne: "待归天命"
 personality_awakened_fallen_empire_authoritarian_waiting_throne_desc: "神皇选择暂离王座，帝国便以克制与沉默守望她的归途。她们不主动扩张，也不轻易卷入年轻文明的纷争，只坚定等待那位女皇再度归来。"
 personality_awakened_fallen_empire_authoritarian_restored_imperium: "帝曜重临"
 personality_awakened_fallen_empire_authoritarian_restored_imperium_desc: "神皇重新坐上王座，旧帝国以更温和而坚定的方式复苏。她们会以帝国之名援助年轻文明，并在银河灾厄降临时主动站上前线。"
 awakened_fallen_empire_authoritarian_mad_queen: "虚狱堕冕"
 awakened_fallen_empire_authoritarian_mad_queen_desc: "从深层虚境归来的疯王已经不再将年轻文明视为平等的臣民，而是视为等待裁断的脆弱尘埃。"
 awakened_fallen_empire_authoritarian_waiting_throne: "待归天命"
 awakened_fallen_empire_authoritarian_waiting_throne_desc: "神皇选择离开王座，帝国则选择等待。她们将以克制与沉默维持旧日秩序。"
 awakened_fallen_empire_authoritarian_restored_imperium: "帝曜重临"
 awakened_fallen_empire_authoritarian_restored_imperium_desc: "神皇归座，帝国复曜。她们不再沉睡，也不再只为自身旧梦而行动。"
 fei_authoritarian_shroud_piercing_situation: "虚境穿刺"
 fei_authoritarian_shroud_piercing_situation_type: "虚境穿刺"
 fei_authoritarian_shroud_piercing_situation_desc: "帷幕刺穿器已经对准深层虚境。它正在不断削弱现实与虚境之间的边界，也让全银河的灵潜变得更加频繁、更加危险。"
 fei_authoritarian_shroud_piercing_approach_hold: "维持重校准"
 fei_authoritarian_shroud_piercing_complete_tooltip: "虚境穿刺完成，事件链将进入三种结局之一。"
 fei_authoritarian_shroud_piercing_stage_1_tooltip: "第一阶段：虚境边界开始松动。"
 fei_authoritarian_shroud_piercing_stage_2_tooltip: "第二阶段：灵能浪潮开始外溢。"
 fei_authoritarian_shroud_piercing_stage_3_tooltip: "第三阶段：囚笼外壳即将被刺穿。"
 fei_authoritarian_piercer_stage_1: "虚境穿刺：边界松动"
 fei_authoritarian_piercer_stage_1_desc: "帷幕刺穿器正在削弱现实与虚境之间的边界。灵潜变得更容易，但也更危险。"
 fei_authoritarian_piercer_stage_2: "虚境穿刺：浪潮外溢"
 fei_authoritarian_piercer_stage_2_desc: "灵能浪潮正在越过边界，虚境中的野性实体开始出现在现实空间。"
 fei_authoritarian_piercer_stage_3: "虚境穿刺：囚笼震动"
 fei_authoritarian_piercer_stage_3_desc: "囚禁神皇的深层结构正在震动。现实和虚境的边界已薄如纸页。"
 fei_authoritarian_god_emperor_crisis_guidance: "神皇的灵能指引"
 fei_authoritarian_god_emperor_crisis_guidance_desc: "归来的神皇正在以无比强大的灵能为我们的舰队提供指引。"
 fei_authoritarian_mad_god_edict_pressure: "疯王敕令重压"
 fei_authoritarian_mad_god_edict_pressure_desc: "我们暂时屈从于疯王的苛刻敕令，帝国内部因此承受着巨大的政治与军事压力。"
 opinion_FEI_refused_piercer_recalibration_authoritarian: "拒绝重校准帷幕刺穿器"
 opinion_FEI_refused_piercer_recalibration_enclave: "拒绝继续营救神皇"
 opinion_FEI_mad_queen_ultimatum_refused: "拒绝疯王敕令"
 opinion_FEI_rallied_against_mad_queen: "共同反抗疯王"
 NAME_FEI_authoritarian_shroud_betrayers: "深层虚境背叛者"
 NAME_FEI_authoritarian_wild_psionic_entity_fleet: "野生灵能实体"
 NAME_FEI_authoritarian_war_against_mad_queen: "终结疯王暴政"
 NAME_FEI_authoritarian_wounded_second_immortal: "负伤的第二永生者"
 NAME_FEI_authoritarian_wounded_second_immortal_fleet: "残破的第二永生者流亡舰队"
 NAME_FEI_authoritarian_returned_heir: "回归王储"
 fei_authoritarian_story.90.name: "帷幕刺穿器完全启动"
 fei_authoritarian_story.90.desc: "深空擎天堡仍在轨道上燃烧着苍白的护盾余辉，帷幕刺穿器终于完成了最后一次重合校准。星球上的古老地块像被重新点燃的神经束一样扩张，泽洛矿脉、灵能回路与埋藏在岩层中的不可名状结构同时苏醒。\n\n[event_target:FEI_authoritarian_veil_system.GetName]的恒星光谱被万华镜般的辉光折叠，整个恒星系都笼罩在变化不定的虚境折射中。现实不再只是现实，它成为了一枚嵌入虚境深处的针。"
 fei_authoritarian_story.90.a: "机器已经醒来。"
 fei_authoritarian_story.91.name: "御座通讯：重校准请求"
 fei_authoritarian_story.91.desc: "威权堕落帝国的通讯没有使用惯常的礼节。第二永生者的声音冰冷而疲惫。\n\n“刺穿器已经完成启动。现在只剩最后一步：让它对准虚境深处真正的囚笼。你们可以终止它，也可以让它继续向下刺入。不要用年轻文明的谨慎粉饰懦弱。我们等待这个机会，已经等待了太久。”"
 fei_authoritarian_story.91.a: "拒绝。到此为止。"
 fei_authoritarian_story.91.b: "同意。将机器重校准，对准深层虚境。"
 fei_authoritarian_story.92.name: "御座的失望"
 fei_authoritarian_story.92.desc: "“渺小。”\n\n威权堕落帝国的回应只有这个词。随后，通讯频道中传来压抑到近乎破碎的怒意。\n\n“你们站在一座旧时代奇迹的顶端，却只看见自己短促寿命里的风险。你们以为这是审慎，实际上只是凡物对永恒的畏惧。”\n\n通讯被切断。策展人的频道保持沉默，虚境行者也不再回应这片星系的呼唤。"
 fei_authoritarian_story.92.a: "我们做出了选择。"
 fei_authoritarian_story.103.name: "虚境穿刺：边界松动"
 fei_authoritarian_story.103.desc: "第一次重校准完成后，全银河的灵能回声都变得清晰起来。灵潜不再像过去那样遥远，但每一次凝视虚境，也都更容易被另一侧的东西回望。"
 fei_authoritarian_story.103.a: "继续。"
 fei_authoritarian_story.104.name: "虚境穿刺：浪潮外溢"
 fei_authoritarian_story.104.desc: "第二阶段推进后，野生灵能实体开始在星图上显现。它们不是有组织的进攻，而是被刺穿器搅动后从裂隙中溅出的虚境碎片。"
 fei_authoritarian_story.104.a: "保持阵线。"
 fei_authoritarian_story.105.name: "虚境穿刺：囚笼震动"
 fei_authoritarian_story.105.desc: "第三阶段到来时，虚境深处传来了持续不断的震动。那不是声音，而是一种被现实强行翻译成声响的结构性崩裂。"
 fei_authoritarian_story.105.a: "最后一步。"
 fei_authoritarian_story.130.name: "结局：疯王"
 fei_authoritarian_story.130.desc: "囚笼被刺穿了。\n\n归来的不是被磨损的慈悲，而是被无穷岁月淬炼到锋利的恶意。第一任永生者神皇从虚境深处回望现实时，理智与怜悯都已成了遥远旧物。她的灵能技艺像超主的刀锋一样精准，轻易抹去了威权堕落帝国内仍敢反对她的殖民地。\n\n御座重新有了唯一的主人，而那位女皇向整个星海投下了第一道疯狂的影子。"
 fei_authoritarian_story.130.a: "暴政归来。"
 fei_authoritarian_story.132.name: "疯王敕令"
 fei_authoritarian_story.132.desc: "威权堕落帝国的敕令抵达了。它没有外交辞令，只有冰冷的命令与无法误读的威胁。\n\n疯王要求你们交出资源、服从调度，并承认御座对年轻文明的绝对裁断权。拒绝将被视为对神皇本人的冒犯，而她已经证明，一颗殖民星的命运在她手中轻如尘埃。"
 fei_authoritarian_story.132.a: "暂且屈从。"
 fei_authoritarian_story.132.b: "拒绝这份暴政。"
 fei_authoritarian_story.136.name: "星海反暴政号召"
 fei_authoritarian_story.136.desc: "另一个古老帝国从沉睡中苏醒。它没有再以旁观者的姿态审视星海，而是公开宣告：疯王的归来不是复兴，而是整个银河必须共同终结的灾厄。\n\n舰队开始集结。年轻文明被呼吁共同抵抗威权御座重新燃起的暴政。"
 fei_authoritarian_story.136.a: "银河不能向疯王屈膝。"
 fei_authoritarian_story.137.name: "负伤的第二永生者"
 fei_authoritarian_story.137.desc: "一支残破的舰队抵达了我们的边境。它的旗舰上，第二永生者不再以御座之主的身份出现，而是以流亡指挥官的身份请求并肩作战。\n\n她在与疯王的第一次对垒中留下了无法复原的创伤，但她的经验、意志和对疯王的了解仍是无价的武器。"
 fei_authoritarian_story.137.a: "欢迎她加入这场战争。"
 fei_authoritarian_story.140.name: "结局：解脱"
 fei_authoritarian_story.140.desc: "囚笼被打开了。\n\n神皇自由了。面对威权遗民们殷切到近乎颤抖的目光，她只是疲惫地笑了笑。她没有走向王座，而是望向星海。\n\n“我已经太久没有真正看过这片银河了。给我五十个千年。让我以星间游侠的身份，重新学会如何活着。”\n\n御座没有被抛弃，只是被温柔地等待。"
 fei_authoritarian_story.140.a: "她选择了星海。"
 fei_authoritarian_story.150.name: "结局：归来"
 fei_authoritarian_story.150.desc: "囚笼被打开了。\n\n神皇重新踏上她的王座，没有疯狂，没有逃离，也没有迟疑。第二永生者低头退回王储之位，帝国在沉默中重新列队。\n\n这一次，威权堕落帝国不再只是旧日的残响。它以帝国的名义向年轻文明伸出援手，并准备在下一场银河灾厄中重新站到最前线。"
 fei_authoritarian_story.150.a: "王座重燃。"
 fei_authoritarian_story.151.name: "王储的历练"
 fei_authoritarian_story.151.desc: "神皇归座后，第二永生者重新退回王储之位。她主动请求加入我们的舰队进行历练。\n\n这一次，她没有背负流亡与创伤，只带着古老帝国重新理解年轻文明的使命而来。"
 fei_authoritarian_story.151.a: "欢迎她，王储。"
