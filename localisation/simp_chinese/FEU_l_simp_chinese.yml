 building_utpiod_capital:"乌托邦元老院"
 building_utpiod_capital_desc:"天国的大脑、元老院的所在。宏伟的外表不足为外人道，闪耀着理想光辉的现实才是它不朽的财富"
 building_utpiod_base:"乌托邦基础设施"
 building_utpiod_base_desc:"滴水穿石非一日之功，居民们所见之处的每一寸土地都融汇着血泪与智慧，风沙尘石和堵塞杂乱均不存在于这座美观齐整的城市"
 tech_utpiod_buildings_1:"乌托邦首府建筑"
 tech_utpiod_buildings_1_desc:"$building_utpiod_capital_desc$"
 tech_utpiod_buildings_2:"乌托邦基础建筑"
 tech_utpiod_buildings_2_desc:"$building_utpiod_base_desc$"
 tech_utpiod_others_technology_1:"乌托邦建筑技术"
 tech_utpiod_others_technology_1_desc:"与一般的工程技术不同，多到满天飞的施工承包邀请不是它的初衷，乌托邦人对交付质量的狂热追求完全是出于匠心"
 tech_utpiod_others_technology_2:"乌托邦军事理论"
 tech_utpiod_others_technology_2_desc:"思想教育和政治工作不会比生活的美好更具说服力。士兵们深刻地知道自己究竟在为什么而战，先进的部队架构和纪律性则教会他们何为“军人"
 tech_utpiod_others_technology_3:"乌托邦管理制度"
 tech_utpiod_others_technology_3_desc:"个人思想与性格的第一道保障就是家庭，社会的发展离不开健康的家庭制度"
 tech_utpiod_others_technology_4:"乌托邦外交办法"
 tech_utpiod_others_technology_4_desc:"精明的算计和巧妙的演说应当助力我们与其他文明实现大同，崭新的星际秩序将从此开始"
 tech_utpiod_others_technology_5:"乌托邦治理技术"
 tech_utpiod_others_technology_5_desc:"我们精妙的国家机器当然能够实现自检自运行，领导者的存在只是为它擦拭边边角角的脏污，并汇总一切发展需求"
 FEU_FRIENDLY_OTHER_01:"和你们在一起，一定能够创造不计其数的奇迹"
 FEU_FRIENDLY_OTHER_02:"文明当如是也，面对[from.owner_main_species.GetName]，我们只有技术值得称道罢了"
 FEU_FRIENDLY_OTHER_03:"乌托邦之梦的前方仍是漫漫长路——如果我们倒下了，还请接过帝国的衣钵"
 FEU_FRIENDLY_OTHER_04:"在未来,[from.GetName]会取得比乌托邦人大得多的成就"
 FEU_FRIENDLY_OTHER_05:"每每看到[from.owner_main_species.GetName]，我们就觉得乌托邦人的付出是有意义、有回报的"
 FEU_FRIENDLY_OTHER_06:"需要一些交流吗？荣幸之至"
 FEU_FRIENDLY_OTHER_07:"银河是一副巨画，而你们的色彩格外艳丽"
 FEU_NETURAL_TO_OTHERS_01:"请问有什么事？"
 FEU_NETURAL_TO_OTHERS_02:"贵方的部分设计架构与我方不尽相同，我们的相关专家希望能够讨论"
 FEU_NETURAL_TO_OTHERS_03:"我们都是河系的宝贵财富，智慧生命与文明让死寂的星空焕发生机"
 FEU_NETURAL_TO_OTHERS_04:"乌托邦人愿意提供任何帮助"
 FEU_NETURAL_TO_OTHERS_05:"我们都需要更深远的学习和进步。 -再璀璨的恒星也无法独霸星空，团结即未来"
 FEU_NETURAL_TO_OTHERS_06:"伟大的理想需要实在的践行，任何时候都不例外"
 FEU_HOSTILE_TO_OTHERS_01:"...你们的姿态令人作呕"
 FEU_HOSTILE_TO_OTHERS_02:"[from.GetName]的政客是一帮胆小如鼠的窃贼"
 FEU_HOSTILE_TO_OTHERS_03:"你们不过是踩在人民头上、妄想把星空据为己有的贪佞"
 FEU_HOSTILE_TO_OTHERS_04:"哦，是你们啊，给我滚回去吧"
 FEU_HOSTILE_TO_OTHERS_05:"在[from.owner_main_species.GetName]的精英们学会如何睁开眼睛前，我们没有任何交流的可能"
 FEU_HOSTILE_TO_OTHERS_06:"你的身上满是血腥味"
 FEU_HOSTILE_TO_OTHERS_07:"你们的文明正处于黑暗时代，而你和你身后的那些人是这一切的诱因"
 FEU_RIVAL_TO_OTHERS_01:"唉... -不是我们主动走到这一步的"
 FEU_RIVAL_TO_OTHERS_02:"再这样下去，你们不会得到任何好处"
 FEU_RIVAL_TO_OTHERS_03:"目光短浅得令人发指... [from.capital_scope.GetName]的人民正在哀嚎!"
 FEU_RIVAL_TO_OTHERS_04:"你们对不起手中的权力，对不起[from.owner_main_species.GetName]"
 FEU_RIVAL_TO_OTHERS_05:"我们感到遗憾，为你们的当下和未来"
 FEU_RIVAL_TO_OTHERS_06:"真是受够了！我们的财富不会成为你们压迫的工具！现在，从我的面前消失！"
 FEU_PEACE_TO_OTHERS_01:"我们做错了什么？一切都是可以挽回的..."
 FEU_PEACE_TO_OTHERS_02:"是我们的举动太过火了吗?"
 FEU_PEACE_TO_OTHERS_03:"友谊难觅，为此，乌托邦人可以献上所有... "
 FEU_PEACE_TO_OTHERS_04:"您还在听吗？现在可以谈谈了吗？ "
 FEU_PEACE_TO_OTHERS_05:"不要太急躁，我们只是需要一点磨合的时间。"
 FEU_PEACE_TO_OTHERS_06:"真诚向贵方道歉，我们会自省的."
 FEU_PEACE_TO_OTHERS_07:"有任何不满意的地方，直接提就是，何至于此呢？"
 FEU_PEACE_TO_OTHERS_08:"请相信乌托邦人，我们不会成为[from.owner_main_species.GetName]的拖累"
 FEU_WAR_TO_OTHERS_01:"螳臂当车"
 FEU_WAR_TO_OTHERS_02:"你以为政治是过家家吗？"
 FEU_WAR_TO_OTHERS_03:"我看到了恶魔的影子"
 FEU_WAR_TO_OTHERS_04:"没有现在杀掉你，是乌托邦最后的仁慈"
 FEU_WAR_TO_OTHERS_05:"自取灭亡"
 FEU_WAR_TO_OTHERS_07:"但愿[from.GetName]军队掠夺的财富能有半丝半毫惠及人民。"
 FEU_WAR_TO_OTHERS_06:"[from.owner_main_species.GetName]的上层需要尽早尽快的毁灭性打击。"
 FEU_main_event.4.title:"通讯信号接入"
 FEU_main_event.4.desc:"[root.owner_main_species]！你们真的做到了！我们一直以来都在观察着你们文明的动向，请原谅这一冒犯之举，我们并非是为了取乐，而是为了获取其他文明的独特经验。 既然你们已经通过了母星的考验，那么我们希望邀请[root.GetName]加入同盟，现在，是所有文明共同建设崭新未来的时候了。 当然，这仅仅是我们的一厢情愿，贵方有权保留靠自己开拓星空的成就感，乌托邦的大门则永远向众文明敞开！"
 FEU_main_event.4.a:"我们当然愿意"
 FEU_main_event.4.b:"我们暂不同意"
 FEU_main_event.5.desc_1:"富有魄力的抉择！我们不会让你们失望的"
 FEU_main_event.5.desc_2:"保持谨慎是星际舞台的主旋律，看来你们已经领悟到了这一点，相信你们能够在时间长河中留下重墨浓彩"
 FEU_main_event.6.desc:"[root.GetName]的各位！我们决定传授你们一些技术...希望你们能够笑纳。"
 FEU_main_event.6.a:"当然！"
 FEU_main_event.6.b:"我们要依靠自己"
 FEU_main_event.7.desc:"那可真是可惜..不过我们相信你们这样出色的种族可以做到的。"
 FEU_main_event.9.desc_1:"经过不懈的发展与改造，我们已能够在太空风暴中坚韧不倒、于星神兽的威胁下傲然挺立，星海共同体的建立更将河系的发展推向新的篇章。 但我们没有想到，无耻的上古帝国会选择在这最繁荣的时刻悍然发动战争，甚至还要强迫所有文明都参与进来！诸君，我们从不倡导杀戮与毁灭，但如若不根除他们的腐朽思想、终结这场所谓的“天堂之战”，方圆数十光年的浩瀚星际就永不安宁！ 现在，我们将兑现承诺，并请求同我们签订过同盟条约的所有文明进一步紧密相合！乌托邦人不需要任何人败倒在脚下，但我们已经受够了堕落帝国高高在上的颐指气使！ 反抗吧！反抗吧！砸碎他们强加的镣铐！还我们一个宇内澄清！"
 FEU_main_event.9.desc_2:"堕落帝国已经撕下了虚伪的面纱，他们正在胁迫每一个人为那可笑的远古冲突献出自己的生命与未来！ 不要轻信他们！这不是第一次，我们早在许多年前就被迫参与过所谓“天堂之战”，那时的乌托邦还不够强大，无数人为此做出无谓的牺牲，而他们、而他们！他们在耗尽半数舰队与资源后握手言和，全然不顾外界的满目疮痍，将国境封锁，大门不迈、二门不出，继续做着复兴的美梦！ 堕落帝国开出的条件令人恐惧，我们不强迫任何人直言拒绝，只求诸位不要成为他们得力的帮凶！我们发展到今天，就是为了让你们不再承受如此苦难，相信我们的力量，更要相信你们自己的双手！"
 FEU_main_event.9.a:"我们会帮助你"
 FEU_main_event.101.desc:"很好，感谢你们的帮助！我们的造船厂给你们分配了一些订单，希望你们好好利用。活下去。"
