 d_fe_utopid_home_desc:"抽取一半的产出是不道德的，这不符合你们的理念。”一位不清楚状况的外交官曾说过这样一句话，和蔼的乌托邦人并未追究，而是给他提供了一个现今被人们抢得头破血流的普通岗位以亲身体验"
