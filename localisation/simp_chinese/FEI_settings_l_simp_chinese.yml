l_simp_chinese:
 FEI_settings.close: "退出"
 FEI_settings.back: "返回设置面板"
 FEI_settings.1.name: "圣权拓展·无限：开局设置"
 FEI_settings.1.desc: "欢迎使用§Y圣权拓展·无限§!。\n\n你可以在此调整本局中 FEI 特殊堕落帝国的强度、查看更新日志、阅读简介与教程，并预先选择是否启用后续的特殊领袖美化立绘。\n\n§Y注意：§!灰空已有独立衣柜系统，不受美化模式开关影响。"
 FEI_settings.1.update: "查看更新日志"
 FEI_settings.1.difficulty: "难度调整"
 FEI_settings.1.beauty: "美化模式"
 FEI_settings.1.intro: "MOD简介"
 FEI_settings.1.tutorial: "教程与测试提示"
 FEI_settings.2.name: "FEI 更新日志"
 FEI_settings.2.desc: "§Y当前开发分支重点：§!\n\n§G1.§! 军国堕落事件链、最终秩序分支、艾露飞地与命定特质（命定效果非最终版）。\n\n§G2.§! 威权堕落事件链已加入帷幕穿刺机、无纪元之门、防线局势、遗民援军、三结局与王储命定特质（效果非最终版）。\n\n§G3.§! 灰空衣柜、形态转换、命定特质与人口科研缩放已修复。\n\n§G4.§! 当前版本新增开局设置面板，用于集中管理难度、美化模式、内测玩家调整。"
 FEI_settings.3.name: "FEI 难度调整"
 FEI_settings.3.desc: "选择 FEI 特殊堕落帝国的额外战斗修正。\n\n该设置会作用于：\n\n$t$—灰空/L门纳米堕落\n\n$t$—军国堕落先驱\n\n$t$—威权堕落帝国\n\n$t$—乌托邦\n\n§Y标准§!不会添加额外修正。其他难度会为上述国家添加武器伤害、射速、护盾与装甲倍率修正。"

§Y作用对象：§!灰空/L门、军国、威权、乌托邦。"
 FEI_settings.3.reduced: "削弱：-25%"
 FEI_settings.3.reduced.tooltip: "FEI 特殊堕落帝国获得 §R-25%§! 武器伤害、射速、护盾与装甲。"
 FEI_settings.3.standard: "标准：无额外修正"
 FEI_settings.3.standard.tooltip: "FEI 特殊堕落帝国不获得额外难度修正。"
 FEI_settings.3.hard: "强化：+50%"
 FEI_settings.3.hard.tooltip: "FEI 特殊堕落帝国获得 §G+50%§! 武器伤害、射速、护盾与装甲。"
 FEI_settings.3.elite: "卓绝：+100%"
 FEI_settings.3.elite.tooltip: "FEI 特殊堕落帝国获得 §G+100%§! 武器伤害、射速、护盾与装甲。"
 FEI_settings.3.nightmare: "终末：+200%"
 FEI_settings.3.nightmare.tooltip: "FEI 特殊堕落帝国获得 §G+200%§! 武器伤害、射速、护盾与装甲。建议仅在高强度银河与高倍率舰队设置下启用。"
 FEI_settings.4.name: "FEI 美化模式"
 FEI_settings.4.desc: "美化模式用于后续替换 FEI 特殊领袖的通讯与领袖立绘。\n\n§Y开启时：§!在你提供对应立绘并完成导入后，特殊领袖将使用美化立绘。\n\n§Y关闭时：§!特殊领袖仍使用对应堕落帝国的种族立绘。\n\n§Y灰空例外：§!灰空已有独立美化/衣柜系统，不受此开关影响。\n\n当前版本已写入全局开关与后续接口；过两天找船坞宝宝要下美术资产。"
 FEI_settings.4.enable: "开启美化模式"
 FEI_settings.4.enable.tooltip: "设置全局标记 §YFEI_settings_beauty_mode_enabled§!。后续特殊领袖美化立绘会读取该开关。"
 FEI_settings.4.disable: "关闭美化模式"
 FEI_settings.4.disable.tooltip: "设置全局标记 §YFEI_settings_beauty_mode_disabled§!。特殊领袖将继续使用对应堕落帝国种族立绘。"
 FEI_settings.5.name: "圣权拓展·无限：简介"
 FEI_settings.5.desc: "§Y圣权拓展·无限§!围绕远古堕落文明、失落帝国、银河遗民与新生文明之间的长期互动展开。\n\n当前核心内容包括：\n\n$t$—灰空/L门纳米堕落\n\n$t$—军国堕落先驱与最终秩序\n\n$t$—威权堕落、帷幕穿刺机与无纪元之门\n\n$t$—艾露飞地、王储历练与多条命定特质线\n\n乌托邦与他们的炙热理想\n\n本面板用于统一管理开局设置，仅限内测玩家享受哦"
 FEI_settings.6.name: "FEI 教程与测试提示"
 FEI_settings.6.desc: "§Y测试提示：§!\n\n§G1.§! 若想测试灰空，可使用 `event Nanites_grander.15` 或 `event Nanites_grander.35`。\n\n§G2.§! 若想测试艾露，可使用 `event fei_militarist_story.73` 生成飞地与指挥官。\n\n§G3.§! 若想测试威权链，可从考古遗址、虚境行者/策展人城邦、无纪元之门局势逐步推进。\n\n§G4.§! 难度修正会由事件刷新到 FEI 特殊堕落帝国身上；若你在控制台中即时修改国家旗标，可重新选择一次难度。仅限内测玩家享受哦"
 fei_settings_difficulty_reduced: "FEI难度：削弱"
 fei_settings_difficulty_reduced_desc: "开局设置面板给予的 FEI 特殊堕落帝国削弱修正。"
 fei_settings_difficulty_hard: "FEI难度：强化"
 fei_settings_difficulty_hard_desc: "开局设置面板给予的 FEI 特殊堕落帝国强化修正。"
 fei_settings_difficulty_elite: "FEI难度：卓绝"
 fei_settings_difficulty_elite_desc: "开局设置面板给予的 FEI 特殊堕落帝国高强度修正。"
 fei_settings_difficulty_nightmare: "FEI难度：终末"
 fei_settings_difficulty_nightmare_desc: "开局设置面板给予的 FEI 特殊堕落帝国极高强度修正。"
