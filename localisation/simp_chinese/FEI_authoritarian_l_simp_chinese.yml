 NAME_FEI_authoritarian_veil_city_state_fleet: "帷幕边境城邦"
 NAME_FEI_authoritarian_veil_city_state_station: "帷幕锚庭"
 site_FEI_authoritarian_veil_machine: "无纪元之门"
 d_FEI_authoritarian_veil_piercer: "帷幕刺穿机"
 site_FEI_authoritarian_veil_machine_desc: "这颗星球的地表层中埋藏着一套横跨大陆板块的巨型装置。它远比星球联盟时代更加古老，甚至早在威权先驱第一任神皇登临星海之前便已被抛入虚空。据遗址中残存的工程签名判断，它曾由某个伟大帝国的首席科学家一手建造，又在完成使命后被随意封存于此。\n\n这段往事本不重要。真正重要的是：它仍然可以运行。"
 d_FEI_authoritarian_veil_piercer_desc: "这台机器并不打开通往虚境的门。它更像是一枚嵌入现实结构的楔子，持续刺穿虚境与现实之间的帷幕。它的启动会在深层虚境中激起难以遮掩的扰动，使泽洛凝结成可被采集的沉积，也让周边研究设施持续接收到来自帷幕另一侧的回声。"
 fei_authoritarian_story.10.name: "比神皇更古老"
 fei_authoritarian_story.10.desc: "考古队最初以为遗址属于威权先驱的神皇时代，但第一批年代测定结果推翻了这个判断。\n\n这台机器远比星球联盟、远比先驱帝国、甚至远比那个被神话化的黄金时代更加古老。地层中偶尔出现的威权徽记不是建造痕迹，而是后世遗民一代又一代留下的搜寻标记。\n\n他们曾来到这里。他们曾试图理解它。他们曾相信它也许能抵达深层虚境的某处牢笼。\n\n然后，他们失败了。"
 fei_authoritarian_story.10.a: "又一次失败的痕迹。"
 fei_authoritarian_story.11.name: "营救者的名单"
 fei_authoritarian_story.11.desc: "第二层结构中保存着密密麻麻的姓名、军衔、誓词与死亡记录。\n\n星球联盟时代的遗民、神皇亲自提拔的总督、曾在威权帝国边疆服役的舰队司令、甚至数个并不隶属于威权先驱的古老文明代表，都曾在漫长岁月中尝试借助这台机器寻找囚笼的方位。\n\n他们尊敬那位神皇，并非因为命令，而是因为记得她确实曾为那个时代带来秩序、繁荣与庇护。\n\n所有尝试都以失败告终。记录者的语气没有绝望，只有疲惫。"
 fei_authoritarian_story.11.a: "他们早已习惯失败。"
 fei_authoritarian_story.12.name: "深层虚境的擦痕"
 fei_authoritarian_story.12.desc: "机器的外层结构被重新点亮后，遗址内出现了短暂的相位错位。\n\n考古队没有看见神皇，也没有听见呼救。只有一些破碎画面：背叛者的密议、堕落者的印记、弑君者的誓言，以及某种来自虚境深处的恶意实体，在阴影中共同完成了一场漫长到近乎完美的囚禁。\n\n如果这些画面可信，那么第一任神皇不是失踪。她被永远困在深层虚境之中。\n\n这台机器也许曾被无数人寄托希望，但阴影中的那些存在显然从未真正畏惧过它。"
 fei_authoritarian_story.12.a: "因为它从未真正启动过。"
 fei_authoritarian_story.13.name: "帷幕刺穿机"
 fei_authoritarian_story.13.desc: "最终舱室打开时，考古队没有找到一扇门。\n\n他们找到的是一根刺入现实本底的针。\n\n这台机器并不温和地打开虚境裂隙，而是以近乎粗暴的方式将现实法则压入帷幕深处。它的第一次完整启动立刻在深层虚境中制造出难以掩盖的扰动。泽洛像霜一样在周边岩层中凝结，研究设备被迫记录下大量无法分类的跨维数据。\n\n阴影中的堕落者也许一开始并不会在意。毕竟，在漫长岁月里，类似的营救尝试已经失败过太多次。\n\n但这一次，机器真的刺穿了虚境的本底。"
 fei_authoritarian_story.13.a: "这一次会被看见。"
 fei_authoritarian_story.20.name: "虚境行者的锚点"
 fei_authoritarian_story.20.desc: "虚境行者的城邦已经在[event_target:FEI_authoritarian_veil_system.GetName]中锚定。通讯画面不再是空洞的噪声，而是来自那座新近显现的飞地。\n\n“我们看见了扰动。又一次尝试。又一次也许会失败的尝试。”\n\n“但这台机器不同。它不是星球联盟的遗物。它更古老，更粗粝，也更接近那道牢笼的外壁。”\n\n“也许可以帮助。必须小心。不要让阴影太早确信它能成功。”\n\n随后，一批泽洛与经文式坐标被转入我们的储备库。对方没有请求我们拯救谁，也没有解释更多。仿佛他们已经在漫长岁月中学会，不该对任何一次希望表现得过于渴求。"
 fei_authoritarian_story.20.a: "这不是第一次营救。"
 fei_authoritarian_story.21.name: "策展人的锚点"
 fei_authoritarian_story.21.desc: "策展人的城邦随后抵达[event_target:FEI_authoritarian_veil_system.GetName]。他们的通讯由新锚定的飞地发出，传来的第一份资料却是一段被反复删改的古老档案。\n\n“第一任神皇曾被许多文明尊敬。并非所有尊敬都来自臣服。有些来自记忆，有些来自债务，有些来自她确实曾经阻止过更糟的未来。”\n\n“关于背叛者、堕落者、弑君者与深层虚境实体的完整记录仍不应交给年轻文明。你们现在需要知道的只有一点：如果这次失败，它也只是漫长失败列表中的又一项。”\n\n“也许可以帮助。必须小心。阴影尚未确认你们手中的机器有多危险。”\n\n通讯结束前，策展人转交了少量研究资料，并开始记录机器的后续扰动。"
 fei_authoritarian_story.21.a: "准许他们记录。"
 fei_authoritarian_story.23.name: "沉默的观察者"
 fei_authoritarian_story.23.desc: "一个小型城邦式空间站已在[event_target:FEI_authoritarian_veil_system.GetName]内完成锚定。它不宣称效忠虚境行者，也不宣称代表策展人。\n\n它只重复发送一段简短讯息：\n\n“观察。记录。等待。不要让阴影知道我们开始相信。”"
 fei_authoritarian_story.23.a: "他们仍然不敢表现出希望。"
 fei_authoritarian_story.31.name: "来自遗民的协助"
 fei_authoritarian_story.31.desc: "来自[event_target:FEI_authoritarian_current_legacy_helper.GetName]的通讯在数次转译后才稳定下来。对方没有说明自己究竟记得多少，也没有承认曾参与过多少次失败的营救。\n\n“我们曾见证过那位神皇的时代。并非所有人都是她的臣民，但许多人欠她一份仍未偿还的债。”\n\n“这不是宣誓。不是臣服。也不是希望。只是一次旧债的利息。”\n\n随后，一批资源和一支护卫舰队被送往[event_target:FEI_authoritarian_veil_system.GetName]。通讯随即结束，仿佛对方不愿让这份善意显得过于郑重。"
 fei_authoritarian_story.31.a: "他们仍然记得她。"
 fei_authoritarian_story.40.name: "第二皇帝的动员令"
 fei_authoritarian_story.40.desc: "威权堕落帝国的通讯抵达时，所有中继频道都短暂安静下来。画面中出现的是第二位永生皇帝本人。\n\n她没有请求，也没有威胁，只以近乎仪式化的平静开口：\n\n“你们启动了她的囚笼之外，第一件真正值得那些弑君者重新确认的事物。”\n\n“我们不会把这称作希望。希望这个词已经被太多失败玷污。但如果深层虚境的风暴因此而来，我将动员我仍能动员的全部舰队。”\n\n“我们会守住那台机器。不是为了你们，也不只是为了她。为了那个仍有人记得的时代。”\n\n通讯结束后，两支威权主力舰队跃迁至[event_target:FEI_authoritarian_veil_system.GetName]。风暴尚未到来，但所有人都知道，阴影已经开始认真注视这里。"
 fei_authoritarian_story.40.a: "风暴之前，群星屏息。"
 NAME_FEI_authoritarian_legacy_guard_fleet: "遗民护卫舰队"
 NAME_FEI_authoritarian_legacy_guard_station: "遗民防御锚点"
 NAME_FEI_authoritarian_emperor_aid_fleet_1: "御前救援舰队"
 NAME_FEI_authoritarian_emperor_aid_fleet_2: "帝座守望舰队"
 fei_authoritarian_story.31.machine.desc: "来自[event_target:FEI_authoritarian_current_legacy_helper.GetName]的通讯支离破碎。大量数据包缺少校验段，时间戳前后矛盾，语音合成器像是在从损坏数据库中拼接一段早已遗失的敬意。\n\n“记录残片：神皇——庇护协议——债务未清。”\n\n“警告：深层虚境实体索引损坏。弑君者标识损坏。背叛者标识损坏。结论仍保留：协助。”\n\n“失败概率高。历史尝试均失败。仍执行。”\n\n随后，一批资源和一支防御舰队抵达[event_target:FEI_authoritarian_veil_system.GetName]。那些机械遗民没有表达希望，只留下了一段重复播放的损坏句子：§Y“债务未清。”§!"
 fei_authoritarian_story.31.hive.desc: "来自[event_target:FEI_authoritarian_current_legacy_helper.GetName]的通讯像是由许多彼此争执的意识同时说出。每一句话都在自我修正，每一个判断都被另一段记忆推翻。\n\n“我们记得她。我们不记得她。她庇护了我们。我们从未被庇护。那些都是同一件事。”\n\n“囚笼在深处。不是深处。是我们不愿看的地方。”\n\n“帮助你们。阻止你们。守住机器。不要让机器启动。继续。”\n\n最终，这个分裂意识仍将资源和防御舰队送往[event_target:FEI_authoritarian_veil_system.GetName]。善意清晰存在，只是被破碎的集体记忆搅成了颠三倒四的回声。"
 NAME_FEI_authoritarian_neutral_guard_country: "帷幕中立守备力量"
 fei_authoritarian_story.60.name: "阴影开始确认"
 fei_authoritarian_story.60.desc: "帷幕刺穿机的读数在一瞬间全部归零。随后，虚境的背景噪声像被某种巨物压弯，沿着机器刺入深处的轨迹向现实反冲。\n\n那些曾经无视这次尝试的阴影，终于开始确认这台机器并非又一件会自行熄灭的遗物。\n\n他们没有发出宣战，也没有留下威胁。只有一段从深层虚境挤出的回声：\n\n§R“弑君仍未完成。囚笼仍须封存。见证者必须沉默。”§!\n\n混杂着虚境恶意实体与失落先驱残影的舰队开始在[event_target:FEI_authoritarian_veil_system.GetName]内显现。"
 fei_authoritarian_story.60.a: "他们终于认真看向这里。"
 fei_authoritarian_story.63.name: "第一次反冲被击退"
 fei_authoritarian_story.63.desc: "最后一支从深层虚境中涌出的敌对舰队在[event_target:FEI_authoritarian_veil_system.GetName]内崩解。那些混杂着恶意实体、堕落残影与古老先驱舰形的军势没有留下残骸，只留下大片短暂发亮的泽洛霜痕。\n\n虚境行者没有欢呼。策展人没有宣布胜利。各个遗民守军也只是重新校准火控，仿佛他们都知道，这不是终点。\n\n但至少这一次，帷幕刺穿机没有被重新掩埋。深层虚境中的囚笼，第一次被迫承受了来自现实的反击。"
 fei_authoritarian_story.63.a: "进入长期防卫。"
 fei_authoritarian_story.64.name: "深空擎天堡陷落"
 fei_authoritarian_story.64.desc: "深空擎天堡的主反应堆在[event_target:FEI_authoritarian_veil_system.GetName]中坍缩。帷幕刺穿机周围的防线被彻底撕开，深层虚境的阴影沿着机器刺入的轨迹反向灌入现实。\n\n观测记录在随后数秒内全部中断。无论星图上还残留着怎样的标记，这个星系作为营救神皇的桥头堡已经毁灭。\n\n事件链到此终止。这一次，它也被写入了漫长失败列表。"
 fei_authoritarian_story.64.a: "又一次失败。"
 NAME_FEI_authoritarian_shroud_assault_fleet_1: "弑君者的第一回声"
 NAME_FEI_authoritarian_shroud_assault_fleet_2: "堕落者的遮蔽舰群"
 NAME_FEI_authoritarian_shroud_assault_fleet_3: "背叛者的缄默舰群"
 NAME_FEI_authoritarian_shroud_entity_1: "囚笼之眼"
 NAME_FEI_authoritarian_shroud_entity_2: "封印之影"
 NAME_FEI_authoritarian_deep_space_citadel: "深空擎天堡"
 NAME_FEI_authoritarian_deep_space_citadel_fleet: "帷幕深空擎天堡"
 fei_authoritarian_veil_war_situation: "深层虚境反冲"
 fei_authoritarian_veil_war_situation_type: "深层虚境反冲"
 fei_authoritarian_veil_war_situation_desc: "帷幕刺穿机已经真正触及深层虚境囚笼的外壁。那些囚笼看守者正在分阶段反扑，试图摧毁守护机器的深空擎天堡。只要擎天堡仍然存在，现实就仍有一枚楔子刺入虚境深处。"
 fei_authoritarian_veil_war_hold_the_line: "固守擎天堡"
 fei_authoritarian_veil_war_complete_tooltip: "深层虚境反冲进入最终阶段。"
 fei_authoritarian_veil_war_stage_1_tooltip: "第一阶段：阴影开始组织反扑。"
 fei_authoritarian_veil_war_stage_2_tooltip: "第二阶段：更多堕落残影被投入战场。"
 fei_authoritarian_veil_war_stage_3_tooltip: "第三阶段：囚笼看守者亲自压近现实。"
 fei_authoritarian_story.70.name: "局势：第一道反冲"
 fei_authoritarian_story.70.desc: "深空擎天堡完成锚定后，帷幕刺穿机周围的空间开始持续震颤。第一批有组织的虚境残影沿着刺穿机造成的裂痕回溯而来。\n\n它们并非真正的主力，更像是囚笼看守者伸出的试探性触须。但这一次，它们不再无视现实中的守军。"
 fei_authoritarian_story.70.a: "守住擎天堡。"
 fei_authoritarian_story.73.name: "局势：第二道反冲"
 fei_authoritarian_story.73.desc: "第一波敌军被击退后，深层虚境没有沉寂。相反，更多被污染的先驱舰形开始从裂痕边缘显现。\n\n策展人的监测数据指出，这些舰队中混杂着许多早已不该存在的识别码。它们可能是失败营救者的残影，也可能是堕落者故意披上的旧时代外壳。"
 fei_authoritarian_story.73.a: "它们正在加码。"
 fei_authoritarian_story.76.name: "局势：第三道反冲"
 fei_authoritarian_story.76.desc: "帷幕刺穿机的针尖已经触碰到某种更深的屏障。深空擎天堡周围的每一寸空间都被压成近乎实体的阴影。\n\n这一次，来袭的不再只是试探。囚笼看守者正在把真正能够封死裂痕的力量投入现实。"
 fei_authoritarian_story.76.a: "最后一道防线。"
 fei_authoritarian_story.79.name: "反冲暂息"
 fei_authoritarian_story.79.desc: "第三阶段反冲被击退后，深层虚境的压力终于短暂回落。深空擎天堡仍然屹立在[event_target:FEI_authoritarian_veil_system.GetName]中，帷幕刺穿机也仍在继续运转。\n\n没有人宣布胜利。所有观察者都知道，真正的囚笼尚未打开。但这一次，现实没有被迫退让。"
 fei_authoritarian_story.79.a: "继续推进。"
 NAME_FEI_authoritarian_stage_1_assault_fleet: "第一道反冲"
 NAME_FEI_authoritarian_stage_2_assault_fleet: "第二道反冲"
 NAME_FEI_authoritarian_stage_3_assault_fleet: "第三道反冲"
 personality_awakened_fallen_empire_authoritarian_mad_queen: "虚狱堕冕"
 personality_awakened_fallen_empire_authoritarian_mad_queen_desc: "这位觉醒帝国的神皇从无尽囚禁中归来，却已将银河视作背叛者、软弱者与待裁断之物。她会以极端扩张欲和战争欲向年轻文明降下苛刻敕令，拒绝者将被灵能怒火惩戒。"
 personality_awakened_fallen_empire_authoritarian_waiting_throne: "待归天命"
 personality_awakened_fallen_empire_authoritarian_waiting_throne_desc: "神皇选择暂离王座，帝国便以克制与沉默守望她的归途。她们不主动扩张，也不轻易卷入年轻文明的纷争，只坚定等待那位女皇再度归来。"
 personality_awakened_fallen_empire_authoritarian_restored_imperium: "帝曜重临"
 personality_awakened_fallen_empire_authoritarian_restored_imperium_desc: "神皇重新坐上王座，旧帝国以更温和而坚定的方式复苏。她们会以帝国之名援助年轻文明，并在银河灾厄降临时主动站上前线。"
 awakened_fallen_empire_authoritarian_mad_queen: "虚狱堕冕"
 awakened_fallen_empire_authoritarian_mad_queen_desc: "从深层虚境归来的疯王已经不再将年轻文明视为平等的臣民，而是视为等待裁断的脆弱尘埃。"
 awakened_fallen_empire_authoritarian_waiting_throne: "待归天命"
 awakened_fallen_empire_authoritarian_waiting_throne_desc: "神皇选择离开王座，帝国则选择等待。她们将以克制与沉默维持旧日秩序。"
 awakened_fallen_empire_authoritarian_restored_imperium: "帝曜重临"
 awakened_fallen_empire_authoritarian_restored_imperium_desc: "神皇归座，帝国复曜。她们不再沉睡，也不再只为自身旧梦而行动。"
