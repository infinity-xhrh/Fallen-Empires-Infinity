 fei_authoritarian_story.90.name: "帷幕刺穿器完全启动"
 fei_authoritarian_story.90.desc: "深空擎天堡仍在轨道上燃烧着苍白的护盾余辉，帷幕刺穿器终于完成了最后一次重合校准。星球上的古老地块像被重新点燃的神经束一样扩张，泽洛矿脉、灵能回路与埋藏在岩层中的不可名状结构同时苏醒。\n\n[event_target:FEI_authoritarian_veil_system.GetName]的恒星光谱被万华镜般的辉光折叠，整个恒星系都笼罩在变化不定的虚境折射中。现实不再只是现实，它成为了一枚嵌入虚境深处的针。"
 fei_authoritarian_story.90.a: "机器已经醒来。"
 fei_authoritarian_story.91.name: "御座通讯：重校准请求"
 fei_authoritarian_story.91.desc: "威权堕落帝国的通讯没有使用惯常的礼节。第二永生者的声音冰冷而疲惫。\n\n“刺穿器已经完成启动。现在只剩最后一步：让它对准虚境深处真正的囚笼。你们可以终止它，也可以让它继续向下刺入。不要用年轻文明的谨慎粉饰懦弱。我们等待这个机会，已经等待了太久。”"
 fei_authoritarian_story.91.a: "拒绝。到此为止。"
 fei_authoritarian_story.91.b: "同意。将机器重校准，对准深层虚境。"
 fei_authoritarian_story.92.name: "御座的失望"
 fei_authoritarian_story.92.desc: "“渺小。”\n\n威权堕落帝国的回应只有这个词。随后，通讯频道中传来压抑到近乎破碎的怒意。\n\n“你们站在一座旧时代奇迹的顶端，却只看见自己短促寿命里的风险。你们以为这是审慎，实际上只是凡物对永恒的畏惧。”\n\n通讯被切断。策展人的频道保持沉默，虚境行者也不再回应这片星系的呼唤。"
 fei_authoritarian_story.92.a: "我们做出了选择。"
 fei_authoritarian_story.103.name: "虚境穿刺：边界松动"
 fei_authoritarian_story.103.desc: "第一次重校准完成后，全银河的灵能回声都变得清晰起来。灵潜不再像过去那样遥远，但每一次凝视虚境，也都更容易被另一侧的东西回望。"
 fei_authoritarian_story.103.a: "继续。"
 fei_authoritarian_story.104.name: "虚境穿刺：浪潮外溢"
 fei_authoritarian_story.104.desc: "第二阶段推进后，野生灵能实体开始在星图上显现。它们不是有组织的进攻，而是被刺穿器搅动后从裂隙中溅出的虚境碎片。"
 fei_authoritarian_story.104.a: "保持阵线。"
 fei_authoritarian_story.105.name: "虚境穿刺：囚笼震动"
 fei_authoritarian_story.105.desc: "第三阶段到来时，虚境深处传来了持续不断的震动。那不是声音，而是一种被现实强行翻译成声响的结构性崩裂。"
 fei_authoritarian_story.105.a: "最后一步。"
 fei_authoritarian_story.130.name: "结局：疯王"
 fei_authoritarian_story.130.desc: "囚笼被刺穿了。\n\n归来的不是被磨损的慈悲，而是被无穷岁月淬炼到锋利的恶意。第一任永生者神皇从虚境深处回望现实时，理智与怜悯都已成了遥远旧物。她的灵能技艺像超主的刀锋一样精准，轻易抹去了威权堕落帝国内仍敢反对她的殖民地。\n\n御座重新有了唯一的主人，而那位女皇向整个星海投下了第一道疯狂的影子。"
 fei_authoritarian_story.130.a: "暴政归来。"
 fei_authoritarian_story.132.name: "疯王敕令"
 fei_authoritarian_story.132.desc: "威权堕落帝国的敕令抵达了。它没有外交辞令，只有冰冷的命令与无法误读的威胁。\n\n疯王要求你们交出资源、服从调度，并承认御座对年轻文明的绝对裁断权。拒绝将被视为对神皇本人的冒犯，而她已经证明，一颗殖民星的命运在她手中轻如尘埃。"
 fei_authoritarian_story.132.a: "暂且屈从。"
 fei_authoritarian_story.132.b: "拒绝这份暴政。"
 fei_authoritarian_story.136.name: "星海反暴政号召"
 fei_authoritarian_story.136.desc: "另一个古老帝国从沉睡中苏醒。它没有再以旁观者的姿态审视星海，而是公开宣告：疯王的归来不是复兴，而是整个银河必须共同终结的灾厄。\n\n舰队开始集结。年轻文明被呼吁共同抵抗威权御座重新燃起的暴政。"
 fei_authoritarian_story.136.a: "银河不能向疯王屈膝。"
 fei_authoritarian_story.137.name: "负伤的第二永生者"
 fei_authoritarian_story.137.desc: "一支残破的舰队抵达了我们的边境。它的旗舰上，第二永生者不再以御座之主的身份出现，而是以流亡指挥官的身份请求并肩作战。\n\n她在与疯王的第一次对垒中留下了无法复原的创伤，但她的经验、意志和对疯王的了解仍是无价的武器。"
 fei_authoritarian_story.137.a: "欢迎她加入这场战争。"
 fei_authoritarian_story.140.name: "结局：解脱"
 fei_authoritarian_story.140.desc: "囚笼被打开了。\n\n神皇自由了。面对威权遗民们殷切到近乎颤抖的目光，她只是疲惫地笑了笑。她没有走向王座，而是望向星海。\n\n“我已经太久没有真正看过这片银河了。给我五十个千年。让我以星间游侠的身份，重新学会如何活着。”\n\n御座没有被抛弃，只是被温柔地等待。"
 fei_authoritarian_story.140.a: "她选择了星海。"
 fei_authoritarian_story.150.name: "结局：归来"
 fei_authoritarian_story.150.desc: "囚笼被打开了。\n\n神皇重新踏上她的王座，没有疯狂，没有逃离，也没有迟疑。第二永生者低头退回王储之位，帝国在沉默中重新列队。\n\n这一次，威权堕落帝国不再只是旧日的残响。它以帝国的名义向年轻文明伸出援手，并准备在下一场银河灾厄中重新站到最前线。"
 fei_authoritarian_story.150.a: "王座重燃。"
 fei_authoritarian_story.151.name: "王储的历练"
 fei_authoritarian_story.151.desc: "神皇归座后，第二永生者重新退回王储之位。她主动请求加入我们的舰队进行历练。\n\n这一次，她没有背负流亡与创伤，只带着古老帝国重新理解年轻文明的使命而来。"
 fei_authoritarian_story.151.a: "欢迎她，王储。"
