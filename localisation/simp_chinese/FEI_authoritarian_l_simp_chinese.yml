 fei_authoritarian_piercer_stage_2: "虚境穿刺：浪潮外溢"
 fei_authoritarian_piercer_stage_2_desc: "灵能浪潮正在越过边界，虚境中的野性实体开始出现在现实空间。"
 fei_authoritarian_piercer_stage_3: "虚境穿刺：囚笼震动"
 fei_authoritarian_piercer_stage_3_desc: "囚禁神皇的深层结构正在震动。现实和虚境的边界已薄如纸页。"
 fei_authoritarian_god_emperor_crisis_guidance: "神皇的灵能指引"
 fei_authoritarian_god_emperor_crisis_guidance_desc: "归来的神皇正在以无比强大的灵能为我们的舰队提供指引。"
 fei_authoritarian_mad_god_edict_pressure: "疯王敕令重压"
 fei_authoritarian_mad_god_edict_pressure_desc: "我们暂时屈从于疯王的苛刻敕令，帝国内部因此承受着巨大的政治与军事压力。"
